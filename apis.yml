aid: nextera-energy
name: NextEra Energy
description: >-
  NextEra Energy, Inc. is a Fortune 500 American energy company and one of the
  largest electric utility holding companies in the United States. It is the
  world's largest generator of renewable energy from the wind and sun, and a
  world leader in battery storage. NextEra Energy operates principally through
  its two subsidiaries, Florida Power & Light (FPL) and NextEra Energy Resources.
  This repository captures the public-facing digital surface, corporate touchpoints,
  and any developer or data resources for NextEra Energy. No public REST APIs,
  developer portal, or machine-readable data feeds have been identified at this time.
